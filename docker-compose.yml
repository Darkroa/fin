version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finai-postgres
    environment:
      POSTGRES_USER: finuser
      POSTGRES_PASSWORD: finpass
      POSTGRES_DB: finforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finai-redis
    ports:
      - "6379:6379"
    restart: unless-stopp


  api:
    build: .
    command: python app.py --mode api
    

  api:
    build: .
    container_name: finai-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finuser:finpass@postgres:5432/finforge
      - REDIS_URL=redis://redis:6379/0
      - GROK_API_KEY=${GROK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  chat-ui:
    build: .
    container_name: finai-chat
    command: python -m src.frontend.chat_ui
    ports:
      - "7860:7860"
    environment:
      - GROK_API_KEY=${GROK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - api
    restart: unless-stopped

  user-dashboard:
    build: .
    container_name: finai-dashboard
    command: streamlit run src/frontend/user_dashboard.py --server.port 8503 --server.address 0.0.0.0
    ports:
      - "8503:8503"
    environment:
      - GROK_API_KEY=${GROK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build: .
    container_name: finai-worker
    command: celery -A src.celery_app.tasks worker --loglevel=info --beat
    environment:
      - DATABASE_URL=postgresql://finuser:finpass@postgres:5432/finforge
      - REDIS_URL=redis://redis:6379/0
      - GROK_API_KEY=${GROK_API_KEY}
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data: