version: 1

services:
  # PostgreSQL Database
  postgres:
    type: pgsql
    name: finai-postgres
    databaseName: finforge
    user: finuser
    password: ${POSTGRES_PASSWORD}
    region: oregon
    plan: free

  # Redis for Celery
  redis:
    type: redis
    name: finai-redis
    region: oregon
    plan: free

  # FastAPI Backend — serves API + React frontend
  api:
    type: web
    name: finai-api
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
    regions: [oregon]
    plan: free
    healthCheckPath: /api/health

  # Celery Worker (background tasks)
  worker:
    type: worker
    name: finai-worker
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: celery -A src.celery_app.tasks worker --loglevel=info --beat
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
    regions: [oregon]
    plan: free
