# ==================== DATABASES ====================
databases:
  - name: finai-postgres
    databaseName: finforge
    user: finuser
    region: oregon
    plan: free

# ==================== SERVICES ====================
services:
  # Redis (Free tier)
  - type: redis
    name: finai-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow internal services"

    # ==================== FRONTEND ====================
  - type: web
    name: finai-frontend
    env: static
    rootDir: frontend
    buildCommand: rm -f package-lock.json && npm config set registry https://registry.npmjs.org/ && npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://finai-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://finai-backend.onrender.com

  # ==================== BACKEND (Python Web Service) ====================
  - type: web
    name: finai-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: finai-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://finai-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"