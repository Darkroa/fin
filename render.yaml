version: 1

# ==================== DATABASES ====================
databases:
  - name: finai-postgres
    databaseName: finforge
    user: finuser
    region: oregon
    plan: free

# ==================== SERVICES ====================
services:
  # Redis (Internal only - recommended)
  - type: redis
    name: finai-redis
    region: oregon
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow internal services + controlled external access if needed"

  # FastAPI Web Service
  - type: web
    name: finai-api
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    region: oregon
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"

  # Celery Worker
  - type: worker
    name: finai-worker
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: celery -A src.celery_app.tasks worker --loglevel=info --beat
    region: oregon
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
